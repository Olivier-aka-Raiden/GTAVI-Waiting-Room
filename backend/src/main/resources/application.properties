# ============================================================
# GTA VI Waiting Room — Backend Configuration
# ============================================================

# ---- Quarkus ----
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,https://gtavi-waiting-room.vercel.app,/https://gtavi-waiting-room-.*\.vercel\.app/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# ---- Neo4j (profile-scoped like radar-app) ----
# Prod: must be set via env vars
%prod.quarkus.neo4j.uri=${NEO4J_URI}
%prod.quarkus.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
%prod.quarkus.neo4j.authentication.password=${NEO4J_PASSWORD:password}

# Dev: local Docker or env override
%dev.quarkus.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
%dev.quarkus.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
%dev.quarkus.neo4j.authentication.password=${NEO4J_PASSWORD:password}

# Test: no URI set → DevServices auto-starts a container

# ---- LangChain4j / AI ----
# DeepSeek API for monitoring extraction
quarkus.langchain4j.openai.api-key=${DEEPSEEK_API_KEY:not-set}
quarkus.langchain4j.openai.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
quarkus.langchain4j.openai.chat-model.model-name=${DEEPSEEK_MODEL:deepseek-chat}
quarkus.langchain4j.openai.timeout=30s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ---- Firebase Cloud Messaging (push notifications) ----
gtavi.fcm.enabled=${FCM_ENABLED:false}
gtavi.fcm.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON}

# ---- Monitoring ----
gtavi.monitoring.enabled=${MONITORING_ENABLED:false}
gtavi.monitoring.default-timeout-ms=15000
gtavi.monitoring.user-agent=GtaVIWaitingRoom/1.0

# ---- Internal job security ----
%dev.gtavi.internal.shared-secret=${INTERNAL_SHARED_SECRET:dev-secret-change-me}
%prod.gtavi.internal.shared-secret=${INTERNAL_SHARED_SECRET}

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.gtavi".level=DEBUG

# ---- Native image ----
quarkus.native.additional-build-args=\
  --initialize-at-run-time=io.grpc.netty.shaded.io.netty.util.internal.logging,\
  -H:+AddAllCharsets
