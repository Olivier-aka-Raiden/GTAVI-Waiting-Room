# ============================================================
# GTA VI Waiting Room — Test Configuration
# ============================================================
# Neo4j DevServices auto-starts a container — no explicit URI needed.

quarkus.neo4j.devservices.enabled=true

# Disable LangChain4j during tests
quarkus.langchain4j.openai.api-key=test-key-not-used
quarkus.langchain4j.openai.base-url=http://127.0.0.1:9
quarkus.langchain4j.openai.timeout=1s

# Disable AI monitoring during tests
gtavi.monitoring.enabled=false

# Disable FCM during tests
gtavi.fcm.enabled=false

# Test internal secret
gtavi.internal.shared-secret=test-secret

# Quieter logs in tests
quarkus.log.level=WARN
quarkus.log.category."com.gtavi".level=INFO
